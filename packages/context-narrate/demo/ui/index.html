<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context Narrate — Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css?v=5" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">Context-Narrate</div>

    <div>
      <div class="sidebar-section-label">Pipeline</div>
      <nav class="sidebar-nav">
        <a class="sidebar-item active" href="#" data-panel="wiki">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="1" width="12" height="14" rx="1.5"/><path d="M5 5h6M5 8h6M5 11h4"/></svg>
          Wiki Repository
        </a>
        <a class="sidebar-item" href="#" data-panel="source">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="4"/><path d="M10 10l3.5 3.5"/></svg>
          Source Mapping
        </a>
        <a class="sidebar-item" href="#" data-panel="script">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h10M3 8h7M3 12h5"/><circle cx="13" cy="12" r="2"/></svg>
          Script &amp; Roles
        </a>
        <a class="sidebar-item" href="#" data-panel="audio">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M6 6l4 2-4 2V6z" fill="currentColor" stroke="none"/></svg>
          Audio Learning
        </a>
      </nav>
    </div>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-bottom">
      <span class="badge badge-green">&#9679; LIVE DEMO</span>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- Top bar -->
    <header class="topbar">
      <div>
        <div class="topbar-title" id="panel-title">Wiki Repository</div>
        <div class="topbar-sub" id="panel-sub">Verified academic source manuscripts</div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-secondary-blue" id="btn-refresh">↺ Reload Data</button>
      </div>
    </header>

    <!-- Panel: Wiki -->
    <section class="panel active" id="panel-wiki">
      <div class="metrics-row" id="wiki-metrics">
        <div class="metric-card skeleton-card"><div class="skeleton" style="height:16px;width:60%;margin-bottom:8px"></div><div class="skeleton" style="height:32px;width:40%"></div></div>
        <div class="metric-card skeleton-card"><div class="skeleton" style="height:16px;width:60%;margin-bottom:8px"></div><div class="skeleton" style="height:32px;width:40%"></div></div>
        <div class="metric-card skeleton-card"><div class="skeleton" style="height:16px;width:60%;margin-bottom:8px"></div><div class="skeleton" style="height:32px;width:40%"></div></div>
      </div>
      <div class="card" id="wiki-detail">
        <div class="skeleton" style="height:16px;width:55%;margin-bottom:12px"></div>
        <div class="skeleton" style="height:14px;width:80%"></div>
      </div>
    </section>

    <!-- Panel: Source Mapping -->
    <section class="panel" id="panel-source">
      <div class="metrics-row" id="source-metrics">
        <div class="metric-card skeleton-card"><div class="skeleton" style="height:16px;width:60%;margin-bottom:8px"></div><div class="skeleton" style="height:32px;width:40%"></div></div>
        <div class="metric-card skeleton-card"><div class="skeleton" style="height:16px;width:60%;margin-bottom:8px"></div><div class="skeleton" style="height:32px;width:40%"></div></div>
        <div class="metric-card skeleton-card"><div class="skeleton" style="height:16px;width:60%;margin-bottom:8px"></div><div class="skeleton" style="height:32px;width:40%"></div></div>
      </div>
      <div class="card" id="source-table-wrap">
        <div class="skeleton" style="height:14px;width:80%;margin-bottom:8px"></div>
        <div class="skeleton" style="height:14px;width:70%"></div>
      </div>
    </section>

    <!-- Panel: Script & Roles -->
    <section class="panel" id="panel-script">
      <div class="card" id="script-content">
        <div class="skeleton" style="height:16px;width:50%;margin-bottom:10px"></div>
        <div class="skeleton" style="height:14px;width:80%"></div>
      </div>
    </section>

    <!-- Panel: Audio -->
    <section class="panel" id="panel-audio">
      <div class="audio-layout">
        <div class="card audio-card" id="audio-content">
          <div class="skeleton" style="height:14px;width:70%;margin-bottom:10px"></div>
          <div class="skeleton" style="height:40px;width:100%"></div>
        </div>
        <div class="card" id="shownotes-content">
          <div class="skeleton" style="height:16px;width:50%;margin-bottom:10px"></div>
          <div class="skeleton" style="height:14px;width:90%"></div>
        </div>
      </div>
    </section>

  </main>

  <script src="./app.js?v=5" defer></script>
</body>
</html>
