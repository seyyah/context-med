[project]
name = "context-med-gate"
version = "0.1.0"
description = "Ingest gate for Context-Med pipeline"
dependencies = [
    "typer>=0.9.0",
    "rich>=13.0.0",
    "PyYAML>=6.0.0",
    "PyMuPDF>=1.23.0"
]
readme = "README.md"
requires-python = ">=3.11"

[project.scripts]
context-gate = "context_gate.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/context_gate"]
