name: "CI Eval & Gamification"

on:
  pull_request_target:
    branches: [main]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  test-and-score:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # Install all packages as editable or at least dependencies
          # Fallback to requirements if any exists, mostly for monorepo testing
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Detect target pack
        id: pack
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)
          # Get the primary package being touched
          TARGET_PACK=$(echo "$CHANGED_FILES" | grep '^packages/' | cut -d '/' -f 2 | sort | uniq | head -n 1)
          echo "target=$TARGET_PACK" >> $GITHUB_OUTPUT

      - name: Run Tests
        if: steps.pack.outputs.target != ''
        id: test
        continue-on-error: true
        run: |
          PACK_DIR="packages/${{ steps.pack.outputs.target }}"
          echo "Running tests for $PACK_DIR"
          cd $PACK_DIR || exit 0

          if [ -f "package.json" ]; then
            echo "Node.js package detected."
            npm install
            npm test > test_output.txt 2>&1 || true
            
            # Extract scores from Jest output
            PASS_COUNT=$(grep -oP '\d+(?= passed)' test_output.txt | tail -n 1 || echo "0")
            FAIL_COUNT=$(grep -oP '\d+(?= failed)' test_output.txt | tail -n 1 || echo "0")
          else
            echo "Python package assumed."
            if [ -f "pyproject.toml" ]; then pip install -e .; fi
            pytest tests/ --junitxml=pytest.xml > test_output.txt || true
            
            PASS_COUNT=$(grep -oP '\d+(?= passed)' test_output.txt || echo "0")
            FAIL_COUNT=$(grep -oP '\d+(?= failed)' test_output.txt || echo "0")
          fi
          
          echo "passed=$PASS_COUNT" >> $GITHUB_OUTPUT
          echo "failed=$FAIL_COUNT" >> $GITHUB_OUTPUT
          
          SCORE=$(( PASS_COUNT * 10 - FAIL_COUNT * 5 ))
          if [ $SCORE -lt 0 ]; then SCORE=0; fi
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          
          if [ "$PASS_COUNT" = "0" ] && [ "$FAIL_COUNT" = "0" ]; then
             echo "conclusion=failure" >> $GITHUB_OUTPUT
          elif [ "$FAIL_COUNT" != "0" ]; then
             echo "conclusion=failure" >> $GITHUB_OUTPUT
          else
             echo "conclusion=success" >> $GITHUB_OUTPUT
          fi

      - name: Post PR Score Comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const passed = parseInt(`${{ steps.test.outputs.passed || 0 }}`, 10);
            const failed = parseInt(`${{ steps.test.outputs.failed || 0 }}`, 10);
            const score = parseInt(`${{ steps.test.outputs.score || 0 }}`, 10);
            const conclusion = `${{ steps.test.outputs.conclusion || 'skipped' }}`;
            const packName = `${{ steps.pack.outputs.target || 'paket tespit edilemedi' }}`;

            const emoji = conclusion === 'success' ? '✅' : '❌';
            let message = `## Test & Gamification Skor Tablosu 🏆\n\n`;
            message += `**Hedef Paket:** \`${packName}\`\n`;
            message += `**Durum:** ${emoji}\n\n`;
            message += `| Metrik | Değer |\n`;
            message += `| :--- | :--- |\n`;
            message += `| 🟢 Geçen Testler | **${passed}** |\n`;
            message += `| 🔴 Kalan Testler | **${failed}** |\n`;
            message += `| ⭐ **Kazanılan Puan** | **${score} XP** |\n\n`;

            if (conclusion !== 'success') {
              message += `**⚠️ PR'ın Merge edilebilmesi için tüm testlerin geçmesi zorunludur!** Lütfen paketinizi düzeltin.`;
            } else {
              message += `🎉 Tebrikler! Tüm testler başarıyla geçti.`;
            }

            await github.rest.issues.createComment({
              issue_number: ${{ github.event.pull_request.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message,
            });

      - name: Gate Check
        if: steps.test.outputs.conclusion == 'failure'
        run: |
           echo "Tests failed. Failing the workflow to block merge."
           exit 1
