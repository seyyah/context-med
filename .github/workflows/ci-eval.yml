name: "CI Eval & Gamification"

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  test-and-score:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # Install all packages as editable or at least dependencies
          # Fallback to requirements if any exists, mostly for monorepo testing
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Detect target pack
        id: pack
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          # Get the primary package being touched
          TARGET_PACK=$(echo "$CHANGED_FILES" | grep '^packages/' | cut -d '/' -f 2 | sort | uniq | head -n 1)
          echo "target=$TARGET_PACK" >> $GITHUB_OUTPUT

      - name: Check for unwanted changes
        id: unwanted
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          # Check for CHANGELOG.md changes
          CHANGELOG_CHANGED=$(echo "$CHANGED_FILES" | grep -c '^CHANGELOG\.md$' || echo "0")

          # Check for workflow changes
          WORKFLOW_CHANGED=$(echo "$CHANGED_FILES" | grep -c '^\.github/workflows/' || echo "0")

          # Check for other core files (not in packages/)
          CORE_FILES=$(echo "$CHANGED_FILES" | grep -v '^packages/' | grep -v '^CHANGELOG\.md$' | grep -v '^\.github/workflows/' || echo "")
          CORE_COUNT=$(echo "$CORE_FILES" | grep -c '.' || echo "0")

          echo "changelog_changed=$CHANGELOG_CHANGED" >> $GITHUB_OUTPUT
          echo "workflow_changed=$WORKFLOW_CHANGED" >> $GITHUB_OUTPUT
          echo "core_count=$CORE_COUNT" >> $GITHUB_OUTPUT

          # Prepare conflict resolution guide
          if [ "$CHANGELOG_CHANGED" != "0" ] || [ "$WORKFLOW_CHANGED" != "0" ]; then
            echo "has_unwanted=true" >> $GITHUB_OUTPUT
          else
            echo "has_unwanted=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Tests
        if: steps.pack.outputs.target != ''
        id: test
        continue-on-error: true # Let it fail but we still calculate score and comment
        run: |
          PACK_DIR="packages/${{ steps.pack.outputs.target }}"
          echo "Running tests for $PACK_DIR"

          # Go to pack dir and run test
          cd $PACK_DIR || exit 0

          # Detect project type and run appropriate tests
          PASS_COUNT=0
          FAIL_COUNT=0

          # Check if it's a Node.js/JavaScript project
          if [ -f "package.json" ]; then
            echo "📦 Detected Node.js project (package.json found)"

            # Install dependencies
            npm install || true

            # Check if Jest is configured
            if grep -q '"jest"' package.json || [ -f "jest.config.js" ]; then
              echo "🧪 Running Jest tests..."
              npm test -- --json --outputFile=jest_output.json || true

              # Parse Jest JSON output
              if [ -f "jest_output.json" ]; then
                PASS_COUNT=$(jq -r '.numPassedTests // 0' jest_output.json 2>/dev/null || echo "0")
                FAIL_COUNT=$(jq -r '.numFailedTests // 0' jest_output.json 2>/dev/null || echo "0")
                echo "✅ Passed: $PASS_COUNT, ❌ Failed: $FAIL_COUNT"
              else
                # Fallback: try to parse from stdout
                npm test > test_output.txt 2>&1 || true
                PASS_COUNT=$(grep -oP '\d+(?= passed)' test_output.txt || echo "0")
                FAIL_COUNT=$(grep -oP '\d+(?= failed)' test_output.txt || echo "0")
              fi
            else
              echo "⚠️ No test framework detected in package.json"
            fi

          # Check if it's a Python project
          elif [ -f "pyproject.toml" ] || [ -f "setup.py" ] || ls tests/test_*.py 2>/dev/null || ls tests/*_test.py 2>/dev/null; then
            echo "🐍 Detected Python project"

            # If we have a local src we install it
            if [ -f "pyproject.toml" ]; then
              pip install -e . || true
            fi

            echo "🧪 Running pytest..."
            pytest tests/ --junitxml=pytest.xml > pytest_output.txt 2>&1 || true

            # Basic gamification point extraction (Count passes/fails from text)
            PASS_COUNT=$(grep -oP '\d+(?= passed)' pytest_output.txt || echo "0")
            FAIL_COUNT=$(grep -oP '\d+(?= failed)' pytest_output.txt || echo "0")
            echo "✅ Passed: $PASS_COUNT, ❌ Failed: $FAIL_COUNT"

          else
            echo "⚠️ Could not detect project type (no package.json, pyproject.toml, or Python tests found)"
          fi

          # GitHub Outputs
          echo "passed=$PASS_COUNT" >> $GITHUB_OUTPUT
          echo "failed=$FAIL_COUNT" >> $GITHUB_OUTPUT

          # Basic score formula (10 per pass, -5 per fail)
          SCORE=$(( PASS_COUNT * 10 - FAIL_COUNT * 5 ))
          if [ $SCORE -lt 0 ]; then SCORE=0; fi
          echo "score=$SCORE" >> $GITHUB_OUTPUT

          # For step success check
          if [ "$FAIL_COUNT" != "0" ]; then
             echo "conclusion=failure" >> $GITHUB_OUTPUT
          else
             echo "conclusion=success" >> $GITHUB_OUTPUT
          fi

      - name: Post PR Score Comment
        if: steps.pack.outputs.target != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const passed = parseInt(`${{ steps.test.outputs.passed || 0 }}`);
            const failed = parseInt(`${{ steps.test.outputs.failed || 0 }}`);
            const score = parseInt(`${{ steps.test.outputs.score || 0 }}`);
            const conclusion = `${{ steps.test.outputs.conclusion }}`;
            const packName = `${{ steps.pack.outputs.target }}`;

            let emoji = conclusion === 'success' ? '✅' : '❌';
            let message = `## Test & Gamification Skor Tablosu 🏆\n\n`;
            message += `**Hedef Paket:** \`${packName}\`\n`;
            message += `**Durum:** ${emoji}\n\n`;
            
            message += `| Metrik | Değer |\n`;
            message += `| :--- | :--- |\n`;
            message += `| 🟢 Geçen Testler | **${passed}** |\n`;
            message += `| 🔴 Kalan Testler | **${failed}** |\n`;
            message += `| ⭐ **Kazanılan Puan** | **${score} XP** |\n\n`;
            
            if (conclusion !== 'success') {
                message += `**⚠️ PR'ın Merge edilebilmesi için tüm testlerin geçmesi zorunludur!** Lütfen paketinizi düzeltin.`;
            } else {
                message += `🎉 Tebrikler! Tüm testler başarıyla geçti.`;
            }
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

      - name: Gate Check
        if: steps.test.outputs.conclusion == 'failure'
        run: |
           echo "Tests failed. Failing the workflow to block merge."
           exit 1

      - name: Post Conflict Resolution Guide
        if: steps.unwanted.outputs.has_unwanted == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const changelogChanged = parseInt(`${{ steps.unwanted.outputs.changelog_changed }}`);
            const workflowChanged = parseInt(`${{ steps.unwanted.outputs.workflow_changed }}`);

            let message = `## ⚠️ İstenmeyen Dosya Değişiklikleri Tespit Edildi\n\n`;
            message += `Bu PR **sadece** \`packages/\` klasörü altındaki kendi paketinizde değişiklik yapmalıdır.\n\n`;
            message += `### 🔍 Tespit Edilen Sorunlar:\n\n`;

            if (changelogChanged > 0) {
              message += `- ❌ **CHANGELOG.md** değiştirilmiş (bu dosyayı değiştirmeyin, otomatik oluşturulur)\n`;
            }

            if (workflowChanged > 0) {
              message += `- ❌ **Workflow dosyaları** (\`.github/workflows/\`) değiştirilmiş\n`;
            }

            message += `\n### ✅ Çözüm: Upstream Değişikliklerini Kullanın\n\n`;
            message += `Bu dosyalardaki değişiklikleri PR'dan çıkarmanız ve ana repo (upstream) versiyonunu kullanmanız gerekiyor.\n\n`;
            message += `#### Adım 1: Fork'unuzu senkronize edin\n\n`;
            message += `\`\`\`bash\n`;
            message += `# 1. Upstream remote'unu ekleyin (ilk seferinde)\n`;
            message += `git remote add upstream https://github.com/seyyah/context-med.git\n\n`;
            message += `# 2. Upstream'den güncellemeleri çekin\n`;
            message += `git fetch upstream\n\n`;
            message += `# 3. Main branch'inizde merge edin\n`;
            message += `git checkout main\n`;
            message += `git merge upstream/main\n`;
            message += `\`\`\`\n\n`;

            message += `#### Adım 2: Conflict'leri çözün (upstream versiyonunu kullanın)\n\n`;
            message += `\`\`\`bash\n`;

            if (workflowChanged > 0) {
              message += `# Workflow dosyalarını upstream'den alın\n`;
              message += `git checkout --theirs .github/workflows/ci-eval.yml\n`;
              message += `git checkout --theirs .github/workflows/gate-core-changes.yml\n\n`;
            }

            if (changelogChanged > 0) {
              message += `# CHANGELOG.md'yi upstream'den alın\n`;
              message += `git checkout --theirs CHANGELOG.md\n\n`;
            }

            message += `# Değişiklikleri commit edin\n`;
            message += `git add .\n`;
            message += `git commit -m "chore: resolve conflicts - use upstream core files"\n\n`;
            message += `# Fork'unuza push edin\n`;
            message += `git push origin main\n`;
            message += `\`\`\`\n\n`;

            message += `#### Adım 3: Doğrulayın\n\n`;
            message += `Push sonrasında:\n`;
            message += `- ✅ PR otomatik olarak güncellenecek\n`;
            message += `- ✅ Conflict'ler çözülecek\n`;
            message += `- ✅ Sadece \`packages/${\`${{ steps.pack.outputs.target }}\`}/\` değişiklikleri kalacak\n\n`;

            message += `---\n\n`;
            message += `**Alternatif:** GitHub web editor'ü kullanarak da conflict'leri çözebilirsiniz:\n`;
            message += `1. PR sayfasında **"Resolve conflicts"** butonuna tıklayın\n`;
            message += `2. Tüm conflict marker'ları (\`<<<<<<<\`, \`>>>>>>>\`) için **upstream (main) versiyonunu** seçin\n`;
            message += `3. **"Mark as resolved"** → **"Commit merge"**\n\n`;

            message += `❓ Sorularınız varsa bu comment'e yanıt verin, yardımcı olalım! 🚀`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
